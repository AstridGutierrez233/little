<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简黑白 iPhone 主题 (自适应版)</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .phone-container {
            width: 95vw;
            max-width: 450px;
            aspect-ratio: 9 / 19.5;
            max-height: 95vh;
            background-color: #f5f5f5;
            border-radius: clamp(30px, 8vw, 50px);
            border: clamp(6px, 2vw, 14px) solid #000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
        }

        /* 顶部刘海/灵动岛模拟 */
        .dynamic-island {
            position: absolute;
            top: 2%;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 4%;
            background-color: #000;
            border-radius: 20px;
            z-index: 20;
        }

        /* 视觉装饰：不规则几何与线条 */
        .bg-polygon-1 {
            position: absolute;
            top: -5%;
            left: -10%;
            width: 60%;
            height: 30%;
            background-color: rgba(0, 0, 0, 0.04);
            clip-path: polygon(20% 0%, 100% 20%, 80% 100%, 0% 80%);
            z-index: 0;
        }

        .bg-polygon-2 {
            position: absolute;
            bottom: 10%;
            right: -10%;
            width: 70%;
            height: 35%;
            background-color: rgba(0, 0, 0, 0.03);
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            z-index: 0;
        }

        .bg-line-1 {
            position: absolute;
            top: 25%;
            left: -20%;
            width: 150%;
            height: 1px;
            background-color: rgba(0, 0, 0, 0.06);
            transform: rotate(-15deg);
            z-index: 0;
        }

        .bg-line-2 {
            position: absolute;
            top: 65%;
            left: -20%;
            width: 150%;
            height: 2px;
            background-color: rgba(0, 0, 0, 0.04);
            transform: rotate(25deg);
            z-index: 0;
        }

        /* 头像与页脚 (Header & Backdrop) */
        .avatar {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 22%;
            aspect-ratio: 1 / 1;
            background-color: #fff;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #f5f5f5;
        }

        .avatar svg {
            width: 50%;
            height: 50%;
            color: #000;
            stroke-width: 1.2;
        }

        .backdrop {
            position: absolute;
            top: calc(10% + 11%); /* 头像 top 10%，高度 22%，一半是 11% */
            left: 5%;
            width: 90%;
            height: 18%;
            background-color: #fff;
            border-radius: clamp(15px, 4vw, 28px);
            z-index: 5;
            box-shadow: 0 12px 35px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 5%;
            box-sizing: border-box;
        }

        .backdrop .title {
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: 600;
            color: #000;
            letter-spacing: 1px;
            margin-bottom: 2%;
        }

        .backdrop .subtitle {
            font-size: clamp(10px, 3vw, 13px);
            color: #666;
            letter-spacing: 0.5px;
        }

        /* 图标与网格 (App Grid) */
        .main-content {
            position: absolute;
            top: 42%;
            left: 5%;
            width: 90%;
            height: 30%;
            display: flex;
            gap: 4%;
            z-index: 5;
        }

        .left-widget {
            flex: 1;
            background-color: #fff;
            border-radius: clamp(15px, 4vw, 28px);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .left-widget:active {
            transform: scale(0.96);
        }

        .left-widget svg {
            width: 40%;
            height: 40%;
            color: #000;
            stroke-width: 1;
        }

        .right-grid {
            flex: 1.2;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4%;
            height: 100%;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10%;
            cursor: pointer;
            text-decoration: none;
        }

        .app-icon {
            width: 80%;
            max-width: 54px;
            aspect-ratio: 1 / 1;
            background-color: #fff;
            border-radius: clamp(10px, 3vw, 16px);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);
            transition: transform 0.2s ease;
        }

        .app-item:active .app-icon {
            transform: scale(0.92);
            background-color: #f5f5f5;
        }

        .app-icon svg {
            width: 50%;
            height: 50%;
            color: #000;
            stroke-width: 1.5;
        }

        /* Shadow App 特殊样式 */
        .app-item.shadow-app .app-icon {
            background-color: #0047AB; /* 克莱因蓝 */
            box-shadow: 0 6px 16px rgba(0, 71, 171, 0.3);
        }
        
        .app-item.shadow-app .app-icon svg {
            color: #fff;
        }

        .app-name {
            font-size: clamp(10px, 2.5vw, 12px);
            color: #000;
            font-weight: 500;
        }

        /* 底栏 (Dock) */
        .dock {
            position: absolute;
            bottom: 5%;
            left: 5%;
            width: 90%;
            height: 10%;
            max-height: 90px;
            background-color: rgba(245, 245, 245, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: clamp(20px, 6vw, 35px);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            z-index: 10;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .dock-item {
            height: 65%;
            aspect-ratio: 1 / 1;
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: clamp(10px, 3vw, 18px);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .dock-item:active {
            transform: scale(0.92);
            background-color: #e8e8e8;
        }

        .dock-item svg {
            width: 45%;
            height: 45%;
            color: #000;
            stroke-width: 1.5;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="dynamic-island"></div>

        <!-- 视觉装饰：不规则几何与线条 -->
        <div class="bg-polygon-1"></div>
        <div class="bg-polygon-2"></div>
        <div class="bg-line-1"></div>
        <div class="bg-line-2"></div>

        <!-- 头像与页脚 -->
        <div class="avatar">
            <!-- 极简人像图标 -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>
        <div class="backdrop">
            <div class="title">Minimalist</div>
            <div class="subtitle">Stay Simple, Stay Focused</div>
        </div>

        <!-- 图标与网格 -->
        <div class="main-content">
            <!-- 左侧信封 -->
            <div class="left-widget">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </div>
            
            <!-- 右侧 2x3 网格 -->
            <div class="right-grid">
                <!-- Shadow App (原微信位置) -->
                <a href="shadow.html" class="app-item shadow-app">
                    <div class="app-icon">
                        <!-- 极简影子/S剪影 -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <path d="M10 13a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"></path>
                            <path d="M14 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"></path>
                            <path d="M10 13c0 1.1.9 2 2 2s2-.9 2-2"></path>
                        </svg>
                    </div>
                    <span class="app-name">Shadow</span>
                </a>
                <!-- 世界书 -->
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                        </svg>
                    </div>
                    <span class="app-name">世界书</span>
                </div>
                <!-- 设置 -->
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                        </svg>
                    </div>
                    <span class="app-name">设置</span>
                </div>
                <!-- 美化 -->
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                            <line x1="12" y1="22.08" x2="12" y2="12"/>
                        </svg>
                    </div>
                    <span class="app-name">美化</span>
                </div>
                <!-- 微博 -->
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                            <line x1="9" y1="9" x2="9.01" y2="9"/>
                            <line x1="15" y1="9" x2="15.01" y2="9"/>
                        </svg>
                    </div>
                    <span class="app-name">微博</span>
                </div>
                <!-- 小红书 -->
                <div class="app-item">
                    <div class="app-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <path d="M16 10a4 4 0 01-8 0"/>
                        </svg>
                    </div>
                    <span class="app-name">小红书</span>
                </div>
            </div>
        </div>

        <!-- 底栏 (Dock) -->
        <div class="dock">
            <!-- 手机 -->
            <div class="dock-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
                </svg>
            </div>
            <!-- 小说 -->
            <div class="dock-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
                </svg>
            </div>
            <!-- 论坛 -->
            <div class="dock-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                    <path d="M16 3.13a4 4 0 010 7.75"/>
                </svg>
            </div>
        </div>
    </div>
</body>
</html>
